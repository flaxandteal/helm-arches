# TODO: decide whether these should be directly parsed to/from the optional ingress also
domainNames: arches.example.org
staticUrl: http://arches.example.org/media/

staticRoot: /static_root # not relevant for offline compression

global:
  postgresql:
    postgresqlUsername: postgres
    postgresqlPassword: postgres # RMV
    postgresqlDatabase: postgres

secretEnv: {}

replicaCount: 1
workerReplicaCount: 1
staticReplicaCount: 1

image:
  repository: ghcr.io/flaxandteal/arches-base
  tag: docker-8.1.0-release
  pullPolicy: IfNotPresent

worker:
  image:
    pullPolicy: IfNotPresent
  readinessProbe:
    initialDelaySeconds: 30
  livenessProbe:
    initialDelaySeconds: 30

api:
  image:
    repository: ghcr.io/flaxandteal/arches-base
    tag: docker-8.1.0-release
    pullPolicy: IfNotPresent
  readinessProbe:
    initialDelaySeconds: 30
  livenessProbe:
    initialDelaySeconds: 30

imageStatic:
  repository: flaxandteal/arches-static
  tag: "5.0"
  pullPolicy: IfNotPresent

# IIIF image server (Cantaloupe). When enabled, a Deployment + Service + ConfigMap
# are rendered, and CANTALOUPE_HOST/PORT are injected into the arches env
# configmap automatically (unless overridden via .Values.env).
cantaloupe:
  enabled: false
  replicaCount: 1
  image:
    repository: uclalibrary/cantaloupe
    tag: "5.0.3-0"
    pullPolicy: IfNotPresent

  source:
    # One of: http, filesystem, s3, azure.
    # Picks which cantaloupe source.static backend to configure below.
    type: http

    # HttpSource — fetches images by HTTPS URL. Works with any public/URL-
    # accessible store (Azure anonymous-blob, public S3 bucket, plain web server).
    http:
      # Prefix prepended to every IIIF identifier, e.g.
      #   https://myacct.blob.core.windows.net/media/images/
      #   https://s3.amazonaws.com/my-bucket/
      urlPrefix: ""
      # Optional basic-auth creds if the endpoint requires it.
      basicAuth:
        username: ""
        password: ""

    # FilesystemSource — reads from a mounted volume.
    filesystem:
      # Path inside the container to read from.
      mountPath: /imageroot
      # Optional PVC to mount at mountPath. If empty, no volume is created
      # (useful when you bake images into a custom cantaloupe image).
      persistentVolumeClaimName: ""
      # Prefix prepended to every IIIF identifier before filesystem lookup.
      pathPrefix: ""

    # S3Source — AWS S3 or any S3-compatible endpoint (MinIO, Wasabi, etc.)
    s3:
      endpoint: ""          # e.g. https://s3.us-east-1.amazonaws.com
      region: ""
      bucket: ""
      accessKeyId: ""
      secretAccessKey: ""
      pathPrefix: ""

    # AzureStorageSource — native Azure Blob source (shared-key auth).
    # NOTE: in Cantaloupe 5.0.3, BasicLookupStrategy for this source has no
    # path_prefix option. Use ScriptLookupStrategy or HttpSource if you need
    # a prefix. For anonymous-readable blobs, prefer source.type=http.
    azure:
      accountName: ""
      accountKey: ""
      container: ""

  # Extra raw cantaloupe.properties entries, appended verbatim.
  # Use this for anything not covered by the structured values above.
  extraProperties: {}
    # HttpSource.allow_insecure: "true"
    # log.application.level: debug

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 2Gi
  readinessProbe:
    initialDelaySeconds: 10
  livenessProbe:
    initialDelaySeconds: 30

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
mobileOauthClientId: null

tiers:
  api:
    enabled: true
  worker:
    enabled: true

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
resourcesStatic: {}
resourcesWorker: {}

nodeSelector: {}

tolerations: []

affinity: {}

postgresqlPasswordKey: postgresql-password

# Subcharts

postgresql:
  image:
    repository: postgis/postgis
    tag: "12-3.0-alpine"

  primary:
    containerSecurityContext:
      runAsUser: 0

  extraEnv:
    - name: POSTGRES_MULTIPLE_EXTENSIONS
      value: postgis,postgis_topology
  initdbScriptsConfigMap: "{{ .Release.Name }}-archesproject-init-db"

couchdb:
  adminUsername: admin
  couchdbConfig:
    couchdb:
      uuid: <YOUR_NEW_COUCHDB_UUID>

rabbitmq:
  image:
    registry: docker.io
    repository: rabbitmq
    tag: "3.10.7"
  rabbitmq:
    username: user
    password: <YOUR_NEW_RABBITMQ_PASSWORD> # TODO: needs improved

mappingJson: null
mappingJsonConfigMap: null # Provide this if the mapping JSON already exists in-cluster
