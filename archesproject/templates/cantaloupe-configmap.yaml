{{- if .Values.cantaloupe.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "arches.fullname" . }}-cantaloupe
  labels:
    {{- include "arches.labels" . | nindent 4 }}
    app.kubernetes.io/component: cantaloupe
data:
  cantaloupe.properties: |
    # Generated by the archesproject helm chart; see values.yaml -> cantaloupe.
    http.enabled = true
    http.http2.enabled = true
    http.host = 0.0.0.0
    http.port = 8182
    processor.fallback = Java2dProcessor
    endpoint.iiif.min_size = 64
    log.application.level = info
    log.application.ConsoleAppender.enabled = true

    {{- $src := .Values.cantaloupe.source }}

    {{- if eq $src.type "http" }}
    source.static = HttpSource
    HttpSource.lookup_strategy = BasicLookupStrategy
    HttpSource.BasicLookupStrategy.url_prefix = {{ required "cantaloupe.source.http.urlPrefix is required when source.type=http" $src.http.urlPrefix }}
    HttpSource.chunking.enabled = true
    HttpSource.chunk_size = 512K
    HttpSource.chunk_cache.enabled = true
    HttpSource.chunk_cache.max_size = 10M
    {{- with $src.http.basicAuth.username }}
    HttpSource.BasicLookupStrategy.auth.basic.username = {{ . }}
    {{- end }}
    {{- with $src.http.basicAuth.password }}
    HttpSource.BasicLookupStrategy.auth.basic.secret = {{ . }}
    {{- end }}

    {{- else if eq $src.type "filesystem" }}
    source.static = FilesystemSource
    FilesystemSource.lookup_strategy = BasicLookupStrategy
    FilesystemSource.BasicLookupStrategy.path_prefix = {{ $src.filesystem.mountPath | trimSuffix "/" }}/{{ $src.filesystem.pathPrefix }}

    {{- else if eq $src.type "s3" }}
    source.static = S3Source
    S3Source.endpoint = {{ required "cantaloupe.source.s3.endpoint is required when source.type=s3" $src.s3.endpoint }}
    {{- with $src.s3.region }}
    S3Source.region = {{ . }}
    {{- end }}
    S3Source.access_key_id = {{ required "cantaloupe.source.s3.accessKeyId is required" $src.s3.accessKeyId }}
    S3Source.secret_key = {{ required "cantaloupe.source.s3.secretAccessKey is required" $src.s3.secretAccessKey }}
    S3Source.bucket.name = {{ required "cantaloupe.source.s3.bucket is required" $src.s3.bucket }}
    S3Source.lookup_strategy = BasicLookupStrategy
    S3Source.BasicLookupStrategy.path_prefix = {{ $src.s3.pathPrefix }}

    {{- else if eq $src.type "azure" }}
    source.static = AzureStorageSource
    AzureStorageSource.account_name = {{ required "cantaloupe.source.azure.accountName is required when source.type=azure" $src.azure.accountName }}
    AzureStorageSource.account_key = {{ required "cantaloupe.source.azure.accountKey is required when source.type=azure" $src.azure.accountKey }}
    AzureStorageSource.container_name = {{ required "cantaloupe.source.azure.container is required when source.type=azure" $src.azure.container }}
    AzureStorageSource.chunking.enabled = true
    AzureStorageSource.chunk_size = 512K
    AzureStorageSource.chunk_cache.enabled = true
    AzureStorageSource.chunk_cache.max_size = 10M
    AzureStorageSource.lookup_strategy = BasicLookupStrategy

    {{- else }}
    {{- fail (printf "cantaloupe.source.type %q is not supported (use http, filesystem, s3, or azure)" $src.type) }}
    {{- end }}

    {{- with .Values.cantaloupe.extraProperties }}
    {{- range $k, $v := . }}
    {{ $k }} = {{ $v }}
    {{- end }}
    {{- end }}
{{- end -}}
